<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo Finanzas</title>

<style>
body { background:#111; color:#eee; font-family:Arial; padding:20px;}
.card { background:#1e1e1e; padding:15px; margin-bottom:15px; border-radius:8px;}
button { width:100%; padding:10px; margin:5px 0; background:#333; color:white; border:none;}
input, select { width:100%; padding:8px; margin-bottom:10px; background:#222; color:white;}
.row { display:flex; gap:10px;}
</style>
</head>

<body>
<div id="app"></div>

<script>

let data = {
config:null,
movimientos:[],
conceptos:["cafe","tabaco","comida","cole","alquiler","transporte","vaquita"]
};

function save(){ localStorage.setItem("geoData", JSON.stringify(data)); }
function load(){ let d=localStorage.getItem("geoData"); if(d) data=JSON.parse(d); }

function init(){ load(); if(!data.config) config(); else main(); }

/* CONFIG */

function config(){
app.innerHTML=`
<h1>Inicio</h1>
<input id="saldo" placeholder="Saldo">
<input id="vaq" placeholder="Vaquita">
<input id="fc" placeholder="Fondo combustible">
<input id="ff" placeholder="Fondo facturas">
<input id="factMes" placeholder="Facturación acumulada">
<input id="combMes" placeholder="Combustible acumulado">
<button onclick="saveConfig()">OK</button>`;
}

function saveConfig(){
data.config={
saldo:+saldo.value||0,
vaquita:+vaq.value||0,
fc:+fc.value||0,
ff:+ff.value||0,
factMes:+factMes.value||0,
combMes:+combMes.value||0
};
save(); main();
}

/* CALCULO */

function calc(){

let s=data.config.saldo;
let v=data.config.vaquita;
let fc=data.config.fc;
let ff=data.config.ff;
let fact=data.config.factMes;
let efectivo=0;
let tarjeta=0;
let comb=data.config.combMes;

data.movimientos.forEach(m=>{

if(m.tipo==="facturacion"){
fact+=m.total;
efectivo+=m.efectivo;
tarjeta+=(m.total-m.efectivo);
s+=m.efectivo;
}

if(m.tipo==="gasto"){
s-=m.importe;
if(m.concepto==="vaquita") v+=m.importe;
}

if(m.tipo==="toComb"){ v-=m.importe; fc+=m.importe; }
if(m.tipo==="toFact"){ v-=m.importe; ff+=m.importe; }

if(m.tipo==="comb"){
if(fc>=m.importe) fc-=m.importe;
else{ let r=m.importe-fc; fc=0; s-=r;}
comb+=m.importe;
}

if(m.tipo==="factura"){
if(ff>=m.importe) ff-=m.importe;
else{ let r=m.importe-ff; ff=0; s-=r;}
}

});

/* 🔥 CALCULO CORRECTO */

let porcentaje = fact<5000?0.45:0.5;

let tuTotal = fact * porcentaje;

/* CLAVE: efectivo ya lo tienes */
let cobroReal = tuTotal - efectivo;

let estado = "";

if(cobroReal > 0){
estado = "Te deben " + cobroReal.toFixed(2) + "€";
}else if(cobroReal < 0){
estado = "Debes devolver " + Math.abs(cobroReal).toFixed(2) + "€";
}else{
estado = "Cuadrado";
}

return {
s,v,fc,ff,
fact,
efectivo,
tarjeta,
tuTotal,
cobroReal,
estado
};
}

/* UI */

function main(){

let r=calc();

let lista="";
data.movimientos.forEach((m,i)=>{
lista+=`
<div style="border-bottom:1px solid #333;padding:5px">
<b>${m.tipo}</b> ${m.total||m.importe}€
<br>${m.concepto||""}
<button onclick="del(${i})">X</button>
</div>`;
});

app.innerHTML=`

<h1>Geo Finanzas</h1>

<div class="card">
<h2>${r.s.toFixed(2)}€</h2>
<p>Vaquita: ${r.v.toFixed(2)}</p>
<p>Combustible: ${r.fc.toFixed(2)}</p>
<p>Facturas: ${r.ff.toFixed(2)}</p>
</div>

<div class="card">
<p>Facturación: ${r.fact.toFixed(2)}</p>
<p>Efectivo: ${r.efectivo.toFixed(2)}</p>
<p>Tarjeta: ${r.tarjeta.toFixed(2)}</p>
<p>Tu total: ${r.tuTotal.toFixed(2)}</p>
<p><b>Cobro real: ${r.cobroReal.toFixed(2)} €</b></p>
<p><b>${r.estado}</b></p>
</div>

<div class="card">

<div class="row">
<button onclick="setModo('facturacion')">Facturación</button>
<button onclick="setModo('gasto')">Gasto</button>
<button onclick="setModo('toComb')">Vaquita → Comb</button>
<button onclick="setModo('toFact')">Vaquita → Facturas</button>
</div>

<div id="form"></div>

<button onclick="guardar()">Guardar</button>

</div>

<div class="card">${lista}</div>

`;

renderForm();
}

/* FORM */

let modo="gasto";

function setModo(m){
modo=m;
renderForm();
}

function renderForm(){

let html="";

if(modo==="facturacion"){
html=`
<input id="total" placeholder="Total día">
<input id="efectivo" placeholder="Efectivo">
`;
}

if(modo==="gasto"){
html=`
<select id="concepto">
${data.conceptos.map(c=>`<option>${c}</option>`).join("")}
</select>
<input id="nuevoConcepto" placeholder="Nuevo concepto">
<input id="importe" placeholder="Importe">
`;
}

if(modo==="toComb" || modo==="toFact"){
html=`<input id="importe" placeholder="Importe">`;
}

document.getElementById("form").innerHTML=html;
}

/* GUARDAR */

function guardar(){

if(modo==="facturacion"){
data.movimientos.push({
tipo:"facturacion",
total:+val("total"),
efectivo:+val("efectivo")
});
}

if(modo==="gasto"){
let concepto=val("nuevoConcepto")||val("concepto");
let importe=+val("importe");

if(!data.conceptos.includes(concepto)){
data.conceptos.push(concepto);
}

data.movimientos.push({
tipo:"gasto",
importe,
concepto
});
}

if(modo==="toComb" || modo==="toFact"){
data.movimientos.push({
tipo:modo,
importe:+val("importe")
});
}

save();
main();
}

/* HELPERS */

function val(id){ return document.getElementById(id)?.value||""; }
function del(i){ data.movimientos.splice(i,1); save(); main(); }

init();

</script>
</body>
</html>
