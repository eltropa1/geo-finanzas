<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo Finanzas</title>

<style>
body {
  background: #111;
  color: #eee;
  font-family: Arial, sans-serif;
  padding: 20px;
  margin: 0;
}

.card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
}

button {
  padding: 8px;
  background: #333;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  background: #222;
  color: white;
  border: 1px solid #444;
  box-sizing: border-box;
}

.row {
  display: flex;
  gap: 10px;
}

.row button {
  flex: 1;
}

.ingreso { color: #4caf50; }
.gasto { color: #ff5252; }

.hist {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #333;
  padding: 8px 0;
}

.hist-left { width: 60%; }
.hist-right { width: 40%; text-align: right; }

.small {
  font-size: 12px;
  color: #aaa;
}

.flash {
  background: #2e7d32;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 6px;
  text-align: center;
}

.month-header {
  cursor: pointer;
  margin: 0 0 10px 0;
}

.kpi {
  font-weight: bold;
}
</style>
</head>

<body>
<div id="app"></div>

<script>
let data = {
  config: null,
  movimientos: [],
  conceptos: ["cafe", "tabaco", "comida", "cole", "alquiler", "transporte", "orange", "luz", "internet", "seguro", "vaquita"],
  precios: { cafe: 1.5, tabaco: 6.7 }
};

let modo = "facturacion";
let editIndex = null;
let flashMsg = "";

function save() {
  localStorage.setItem("geoData", JSON.stringify(data));
}

function load() {
  const d = localStorage.getItem("geoData");
  if (d) data = JSON.parse(d);
}

function init() {
  load();
  if (!data.config) config();
  else main();
}

/* CONFIG */

function config() {
  app.innerHTML = `
    <h2>Inicio</h2>
    <input id="saldo" placeholder="Saldo">
    <input id="vaq" placeholder="Vaquita">
    <input id="fc" placeholder="Fondo combustible">
    <input id="ff" placeholder="Fondo facturas">
    <input id="factMes" placeholder="Facturación acumulada">
    <input id="combMes" placeholder="Combustible acumulado">
    <button onclick="saveConfig()">Guardar</button>
  `;
}

function saveConfig() {
  data.config = {
    saldo: +saldo.value || 0,
    vaquita: +vaq.value || 0,
    fc: +fc.value || 0,
    ff: +ff.value || 0,
    factMes: +factMes.value || 0,
    combMes: +combMes.value || 0
  };
  save();
  main();
}

/* HELPERS FECHAS */

function getMonthKey(fecha) {
  const d = new Date(fecha);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}

function getDaysUntilEndOfMonth() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const today = now.getDate();
  const lastDay = new Date(year, month + 1, 0).getDate();
  return lastDay - today;
}

/* CALCULO */

function calc() {
  let s = data.config.saldo;
  let v = data.config.vaquita;
  let fc = data.config.fc;
  let ff = data.config.ff;
  let fact = data.config.factMes;
  let efectivo = 0;
  let tarjeta = 0;
  let comb = data.config.combMes;
  let anticipo = 0;

  let totalGastos = 0;
  let totalOperativo = 0;
  let stats = {};

  const gastosFijos = ["alquiler", "facturas", "seguro", "luz", "internet", "orange", "cole"];

  data.movimientos.forEach(m => {
    if (m.tipo === "facturacion") {
      fact += m.total;
      efectivo += m.efectivo;
      tarjeta += (m.total - m.efectivo);
      s += m.efectivo;
    }

    if (m.tipo === "anticipo") {
      s += m.importe;
      anticipo += m.importe;
    }

    if (m.tipo === "gasto") {
      s -= m.importe;
      totalGastos += m.importe;

      if (!stats[m.concepto]) stats[m.concepto] = 0;
      stats[m.concepto] += m.importe;

      if (m.concepto === "vaquita") v += m.importe;

      if (!gastosFijos.includes(m.concepto)) {
        totalOperativo += m.importe;
      }
    }

    if (m.tipo === "comb") {
      if (fc >= m.importe) {
        fc -= m.importe;
      } else {
        const r = m.importe - fc;
        fc = 0;
        s -= r;
      }

      comb += m.importe;
      totalGastos += m.importe;
      stats["combustible"] = (stats["combustible"] || 0) + m.importe;
      totalOperativo += m.importe;
    }

    if (m.tipo === "toComb") {
      v -= m.importe;
      fc += m.importe;
    }

    if (m.tipo === "toFact") {
      v -= m.importe;
      ff += m.importe;
    }
  });

  /* TAXI */

  const porcentaje = fact < 5000 ? 0.45 : 0.5;
  const tuTotal = fact * porcentaje;
  const cobroReal = tuTotal - efectivo - anticipo;

  /* IA FINAL */

  const diasRegistrados = Math.max(1, data.movimientos.length);
  const gastoMedioOperativo = totalOperativo / diasRegistrados;

  const diasFinMes = getDaysUntilEndOfMonth();
  const autonomiaDias = gastoMedioOperativo > 0 ? s / gastoMedioOperativo : 999;
  const saldoPrevistoFinMes = s - (gastoMedioOperativo * diasFinMes);
  const gastoMaximoDiario = diasFinMes > 0 ? s / diasFinMes : s;

  let estadoMes = "Vas bien";
  if (saldoPrevistoFinMes < 0) estadoMes = "No llegas";
  else if (autonomiaDias < diasFinMes || saldoPrevistoFinMes < 100) estadoMes = "Vas justo";

  let topConcepto = null;
  let topValor = 0;

  for (const k in stats) {
    if (stats[k] > topValor) {
      topValor = stats[k];
      topConcepto = k;
    }
  }

  const ahorroPotencial = topValor * 0.2;

  let controlCombustible = "Combustible dentro de lo esperado";
  if ((stats["combustible"] || 0) > 300) {
    controlCombustible = "Combustible alto este mes";
  }

  return {
    s, v, fc, ff,
    fact, efectivo, tarjeta, comb, anticipo,
    tuTotal, cobroReal, porcentaje,
    stats,
    estadoMes,
    gastoMedioOperativo,
    diasFinMes,
    autonomiaDias,
    saldoPrevistoFinMes,
    gastoMaximoDiario,
    topConcepto,
    topValor,
    ahorroPotencial,
    controlCombustible
  };
}

/* UI */

function main() {
  const r = calc();

  /* STATS */
  let statsHTML = "";
  for (const k in r.stats) {
    statsHTML += `<p>${k}: ${r.stats[k].toFixed(2)}€</p>`;
  }

  /* HISTORIAL POR MESES */
  const grupos = {};
  data.movimientos.forEach((m, i) => {
    const key = getMonthKey(m.fecha || Date.now());
    if (!grupos[key]) grupos[key] = [];
    grupos[key].push({ m, i });
  });

  const actualKey = getMonthKey(Date.now());

  let lista = "";

  for (const key in grupos) {
    const abierto = key === actualKey;

    lista += `
      <div class="card">
        <h3 class="month-header" onclick="toggleMes('${key}')">${key} ${abierto ? "▼" : "▶"}</h3>
        <div id="mes-${key}" style="display:${abierto ? "block" : "none"};">
    `;

    grupos[key].forEach(obj => {
      const m = obj.m;
      const i = obj.i;
      const clase = (m.tipo === "facturacion" || m.tipo === "anticipo") ? "ingreso" : "gasto";

      if (editIndex === i) {
        lista += `
          <div class="hist">
            <div class="hist-left">
              <input id="editImporte" value="${m.importe || m.total || ""}">
              <input id="editConcepto" value="${m.concepto || ""}">
              ${m.tipo === "facturacion" ? `<input id="editEfectivo" value="${m.efectivo || 0}">` : ""}
            </div>
            <div class="hist-right">
              <button onclick="saveEdit(${i})">✔</button>
              <button onclick="cancelEdit()">✖</button>
            </div>
          </div>
        `;
      } else {
        lista += `
          <div class="hist">
            <div class="hist-left">
              <div class="${clase}"><b>${m.tipo}</b></div>
              <div class="small">${m.concepto || ""}</div>
            </div>
            <div class="hist-right">
              <div>${m.total || m.importe}€</div>
              <button onclick="edit(${i})">✏</button>
              <button onclick="del(${i})">🗑</button>
            </div>
          </div>
        `;
      }
    });

    lista += `</div></div>`;
  }

  app.innerHTML = `
    <h2>Geo Finanzas</h2>

    ${flashMsg ? `<div class="flash">${flashMsg}</div>` : ""}

    <div class="card">
      <h3>${r.s.toFixed(2)}€</h3>
      <p>Vaquita: ${r.v.toFixed(2)}</p>
      <p>Combustible: ${r.fc.toFixed(2)}</p>
      <p>Facturas: ${r.ff.toFixed(2)}</p>
    </div>

    <div class="card">
      <p>Facturación: ${r.fact.toFixed(2)}</p>
      <p>% aplicado: ${r.porcentaje * 100}%</p>
      <p>Anticipos: ${r.anticipo.toFixed(2)}</p>
      <p class="kpi">Cobro real: ${r.cobroReal.toFixed(2)}€</p>
    </div>

    <div class="card">
      <h3>IA</h3>
      <p><b>Estado del mes:</b> ${r.estadoMes}</p>
      <p><b>Gasto máximo hoy:</b> ${r.gastoMaximoDiario.toFixed(2)}€</p>
      <p><b>Proyección fin de mes:</b> ${r.saldoPrevistoFinMes.toFixed(2)}€</p>
      <p><b>Fuga principal:</b> ${r.topConcepto || "-"} (${(r.topValor || 0).toFixed(2)}€)</p>
      <p><b>Ahorro posible (-20%):</b> ${r.ahorroPotencial.toFixed(2)}€</p>
      <p><b>Control combustible:</b> ${r.controlCombustible}</p>
      <p class="small">Días hasta fin de mes: ${r.diasFinMes}</p>
      <p class="small">Autonomía estimada: ${r.autonomiaDias.toFixed(1)} días</p>
      <p class="small">Gasto medio operativo: ${r.gastoMedioOperativo.toFixed(2)}€</p>
    </div>

    <div class="card">
      <div class="row">
        <button onclick="setModo('facturacion')">Ingreso</button>
        <button onclick="setModo('gasto')">Gasto</button>
        <button onclick="setModo('anticipo')">Anticipo</button>
      </div>

      <div id="form"></div>
      <button onclick="guardar()">Guardar</button>
    </div>

    <div class="card">
      <h3>Stats</h3>
      ${statsHTML || "<p>No hay datos</p>"}
    </div>

    <div class="card">
      <h3>Historial</h3>
      ${lista || "<p>No hay movimientos</p>"}
    </div>
  `;

  renderForm();
  flashMsg = "";
}

/* FORM */

function setModo(m) {
  modo = m;
  renderForm();
}

function renderForm() {
  let html = "";

  if (modo === "facturacion") {
    html = `
      <input id="total" placeholder="Total día">
      <input id="efectivo" placeholder="Efectivo">
    `;
  }

  if (modo === "anticipo") {
    html = `<input id="importe" placeholder="Importe">`;
  }

  if (modo === "gasto") {
    html = `
      <select id="concepto" onchange="autofill()">
        ${data.conceptos.map(c => `<option>${c}</option>`).join("")}
        <option value="toComb">→ Fondo Comb</option>
        <option value="toFact">→ Fondo Fact</option>
        <option value="combustible_directo">combustible</option>
      </select>
      <input id="nuevoConcepto" placeholder="Nuevo concepto">
      <input id="importe" placeholder="Importe">
    `;
  }

  document.getElementById("form").innerHTML = html;
}

/* AUTOFILL */

function autofill() {
  const c = val("concepto");
  if (data.precios[c]) {
    document.getElementById("importe").value = data.precios[c];
  }
}

/* GUARDAR */

function guardar() {
  if (modo === "facturacion") {
    data.movimientos.push({
      tipo: "facturacion",
      total: +val("total"),
      efectivo: +val("efectivo"),
      fecha: Date.now()
    });
    flashMsg = "Ingreso guardado";
  }

  if (modo === "anticipo") {
    data.movimientos.push({
      tipo: "anticipo",
      importe: +val("importe"),
      fecha: Date.now()
    });
    flashMsg = "Anticipo guardado";
  }

  if (modo === "gasto") {
    const concepto = val("nuevoConcepto") || val("concepto");
    const importe = +val("importe");

    if (concepto === "toComb") {
      data.movimientos.push({ tipo: "toComb", importe, fecha: Date.now() });
      flashMsg = "Vaquita → Fondo combustible";
    } else if (concepto === "toFact") {
      data.movimientos.push({ tipo: "toFact", importe, fecha: Date.now() });
      flashMsg = "Vaquita → Fondo facturas";
    } else if (concepto === "combustible_directo") {
      data.movimientos.push({ tipo: "comb", importe, fecha: Date.now() });
      flashMsg = "Combustible guardado";
    } else {
      if (!data.conceptos.includes(concepto)) {
        data.conceptos.push(concepto);
      }
      data.precios[concepto] = importe;

      data.movimientos.push({
        tipo: "gasto",
        importe,
        concepto,
        fecha: Date.now()
      });
      flashMsg = "Gasto guardado";
    }
  }

  save();
  main();
}

/* EDITAR */

function edit(i) {
  editIndex = i;
  main();
}

function saveEdit(i) {
  const m = data.movimientos[i];

  if (m.tipo === "facturacion") {
    m.total = +document.getElementById("editImporte").value;
    m.efectivo = +document.getElementById("editEfectivo").value;
  } else {
    m.importe = +document.getElementById("editImporte").value;
    m.concepto = document.getElementById("editConcepto").value || m.concepto;
  }

  editIndex = null;
  save();
  main();
}

function cancelEdit() {
  editIndex = null;
  main();
}

/* ACCORDION */

function toggleMes(key) {
  const el = document.getElementById("mes-" + key);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

/* HELPERS */

function val(id) {
  return document.getElementById(id)?.value || "";
}

function del(i) {
  data.movimientos.splice(i, 1);
  save();
  main();
}

init();
</script>
</body>
</html>
