<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo Finanzas</title>

<style>
body { background:#111; color:#eee; font-family:Arial; padding:20px; margin:0;}
.card { background:#1e1e1e; padding:15px; margin-bottom:15px; border-radius:8px;}
button { padding:10px; background:#333; color:white; border:none; border-radius:6px;}
input, select { width:100%; padding:8px; margin-bottom:10px; background:#222; color:white; border:1px solid #444;}
.row { display:flex; gap:10px;}
.row button { flex:1; }

.ingreso { color:#4caf50; }
.gasto { color:#ff5252; }

.hist { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding:8px 0;}
.hist-left { width:60%; }
.hist-right { width:40%; text-align:right; }

.small { font-size:12px; color:#aaa; }

.flash { background:#2e7d32; padding:10px; margin-bottom:10px; border-radius:6px; text-align:center;}
</style>
</head>

<body>
<div id="app"></div>

<script>

let data = {
config:null,
movimientos:[],
conceptos:["cafe","tabaco","comida","cole","alquiler","transporte","vaquita"],
precios:{ cafe:1.5, tabaco:6.7 }
};

let modo="gasto";
let flashMsg="";

function save(){ localStorage.setItem("geoData", JSON.stringify(data)); }
function load(){ let d=localStorage.getItem("geoData"); if(d) data=JSON.parse(d); }

function init(){ load(); if(!data.config) config(); else main(); }

/* CONFIG */

function config(){
app.innerHTML=`
<h2>Inicio</h2>
<input id="saldo" placeholder="Saldo">
<input id="vaq" placeholder="Vaquita">
<input id="fc" placeholder="Fondo combustible">
<input id="ff" placeholder="Fondo facturas">
<input id="factMes" placeholder="Facturación acumulada">
<input id="combMes" placeholder="Combustible acumulado">
<button onclick="saveConfig()">Guardar</button>`;
}

function saveConfig(){
data.config={
saldo:+saldo.value||0,
vaquita:+vaq.value||0,
fc:+fc.value||0,
ff:+ff.value||0,
factMes:+factMes.value||0,
combMes:+combMes.value||0
};
save(); main();
}

/* CALCULO */

function calc(){

let s=data.config.saldo;
let v=data.config.vaquita;
let fc=data.config.fc;
let ff=data.config.ff;
let fact=data.config.factMes;
let efectivo=0;
let tarjeta=0;
let comb=data.config.combMes;
let stats={};

data.movimientos.forEach(m=>{

if(m.tipo==="facturacion"){
fact+=m.total;
efectivo+=m.efectivo;
tarjeta+=(m.total-m.efectivo);
s+=m.efectivo;
}

if(m.tipo==="gasto"){
s-=m.importe;

if(!stats[m.concepto]) stats[m.concepto]=0;
stats[m.concepto]+=m.importe;

if(m.concepto==="vaquita") v+=m.importe;
}

if(m.tipo==="comb"){
if(fc>=m.importe) fc-=m.importe;
else{ let r=m.importe-fc; fc=0; s-=r;}
comb+=m.importe;
stats["combustible"]=(stats["combustible"]||0)+m.importe;
}

if(m.tipo==="toComb"){ v-=m.importe; fc+=m.importe; }
if(m.tipo==="toFact"){ v-=m.importe; ff+=m.importe; }

});

/* TAXI */

let porcentaje = fact<5000?0.45:0.5;
let tuTotal = fact * porcentaje;
let cobroReal = tuTotal - efectivo;

let estado = cobroReal>0
? "Te deben "+cobroReal.toFixed(2)+"€"
: cobroReal<0
? "Debes devolver "+Math.abs(cobroReal).toFixed(2)+"€"
: "Cuadrado";

return {s,v,fc,ff,fact,efectivo,tarjeta,tuTotal,cobroReal,estado,porcentaje,stats};
}

/* UI */

function main(){

let r=calc();

let statsHTML="";
for(let k in r.stats){
statsHTML+=`<p>${k}: ${r.stats[k].toFixed(2)}€</p>`;
}

/* HISTORIAL */

let lista="";
data.movimientos.forEach((m,i)=>{

let clase = (m.tipo==="facturacion") ? "ingreso" : "gasto";

lista+=`
<div class="hist">
  <div class="hist-left">
    <div class="${clase}"><b>${m.tipo}</b></div>
    <div class="small">${m.concepto||""}</div>
  </div>
  <div class="hist-right">
    <div>${(m.total||m.importe)}€</div>
    <button onclick="editar(${i})">✏</button>
    <button onclick="del(${i})">🗑</button>
  </div>
</div>`;
});

app.innerHTML=`

<h2>Geo Finanzas</h2>

${flashMsg?`<div class="flash">${flashMsg}</div>`:""}

<div class="card">
<h3>${r.s.toFixed(2)}€</h3>
<p>Vaquita: ${r.v.toFixed(2)}</p>
<p>Combustible: ${r.fc.toFixed(2)}</p>
<p>Facturas: ${r.ff.toFixed(2)}</p>
</div>

<div class="card">
<p>Facturación: ${r.fact.toFixed(2)}</p>
<p>%: ${r.porcentaje*100}</p>
<p><b>Cobro real: ${r.cobroReal.toFixed(2)}€</b></p>
<p>${r.estado}</p>
</div>

<div class="card">
<div class="row">
<button onclick="setModo('facturacion')">Ingreso</button>
<button onclick="setModo('gasto')">Gasto</button>
</div>

<div id="form"></div>

<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<h3>Stats</h3>
${statsHTML}
</div>

<div class="card">
<h3>Historial</h3>
${lista}
</div>
`;

renderForm();
flashMsg="";
}

/* FORM */

function setModo(m){ modo=m; renderForm(); }

function renderForm(){

let html="";

if(modo==="facturacion"){
html=`
<input id="total" placeholder="Total día">
<input id="efectivo" placeholder="Efectivo">
`;
}

if(modo==="gasto"){
html=`
<select id="concepto" onchange="autofill()">
${data.conceptos.map(c=>`<option>${c}</option>`).join("")}
<option value="toComb">→ Fondo Comb</option>
<option value="toFact">→ Fondo Fact</option>
</select>

<input id="nuevoConcepto" placeholder="Nuevo concepto">
<input id="importe" placeholder="Importe">
`;
}

document.getElementById("form").innerHTML=html;
}

/* AUTOFILL */

function autofill(){
let c=val("concepto");
if(data.precios[c]) document.getElementById("importe").value=data.precios[c];
}

/* GUARDAR */

function guardar(){

if(modo==="facturacion"){
data.movimientos.push({
tipo:"facturacion",
total:+val("total"),
efectivo:+val("efectivo")
});
flashMsg="Ingreso guardado";
}

if(modo==="gasto"){

let concepto=val("nuevoConcepto")||val("concepto");
let importe=+val("importe");

if(concepto==="toComb"){
data.movimientos.push({tipo:"toComb",importe});
flashMsg="Vaquita → Combustible";
}
else if(concepto==="toFact"){
data.movimientos.push({tipo:"toFact",importe});
flashMsg="Vaquita → Facturas";
}
else{

if(!data.conceptos.includes(concepto)){
data.conceptos.push(concepto);
}

data.precios[concepto]=importe;

data.movimientos.push({
tipo:"gasto",
importe,
concepto
});

flashMsg="Gasto guardado";
}

}

save();
main();
}

/* EDITAR */

function editar(i){

let m=data.movimientos[i];

let nuevo=prompt("Nuevo importe:", m.importe||m.total);
if(nuevo!==null){

if(m.tipo==="facturacion"){
m.total=+nuevo;
}
else{
m.importe=+nuevo;
}

save();
main();
}
}

/* HELPERS */

function val(id){ return document.getElementById(id)?.value||""; }
function del(i){ data.movimientos.splice(i,1); save(); main(); }

init();

</script>
</body>
</html>
