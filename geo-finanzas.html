<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo Finanzas</title>

<style>
body { background:#111; color:#eee; font-family:Arial; padding:20px;}
.card { background:#1e1e1e; padding:15px; margin-bottom:15px; border-radius:8px;}
button { width:100%; padding:10px; margin:5px 0; background:#333; color:white; border:none;}
input, select, textarea { width:100%; padding:8px; margin-bottom:10px; background:#222; color:white;}
.small { font-size:12px; color:#aaa;}
</style>
</head>

<body>
<div id="app"></div>

<script>

let data = {
  config:null,
  movimientos:[],
  conceptos:["café","tabaco","comida","cole","alquiler","transporte"]
};

function save(){ localStorage.setItem("geoData", JSON.stringify(data)); }
function load(){ let d=localStorage.getItem("geoData"); if(d) data=JSON.parse(d); }

function init(){ load(); if(!data.config) config(); else main(); }

/* CONFIG */

function config(){
app.innerHTML=`
<h1>Inicio</h1>
<input id="saldo" placeholder="Saldo">
<input id="vaq" placeholder="Vaquita">
<input id="fc" placeholder="Fondo combustible">
<input id="ff" placeholder="Fondo facturas">
<button onclick="saveConfig()">OK</button>`;
}

function saveConfig(){
data.config={
saldo:+saldo.value||0,
vaquita:+vaq.value||0,
fc:+fc.value||0,
ff:+ff.value||0
};
save(); main();
}

/* CALCULO */

function calc(){

let s=data.config.saldo;
let v=data.config.vaquita;
let fc=data.config.fc;
let ff=data.config.ff;

data.movimientos.forEach(m=>{

if(m.tipo==="facturacion") s+=m.efectivo;
if(m.tipo==="gasto") s-=m.importe;

if(m.tipo==="vaquita"){ s-=m.importe; v+=m.importe; }

if(m.tipo==="toComb"){ v-=m.importe; fc+=m.importe; }
if(m.tipo==="toFact"){ v-=m.importe; ff+=m.importe; }

if(m.tipo==="comb"){
if(fc>=m.importe) fc-=m.importe;
else{ let r=m.importe-fc; fc=0; s-=r;}
}

if(m.tipo==="factura"){
if(ff>=m.importe) ff-=m.importe;
else{ let r=m.importe-ff; ff=0; s-=r;}
}

});

return {s,v,fc,ff};
}

/* UI */

function main(){

let r=calc();

let lista="";
data.movimientos.forEach((m,i)=>{
lista+=`
<div style="border-bottom:1px solid #333;padding:5px">
<b>${m.tipo}</b> ${m.importe||m.total}€
<br><span class="small">${m.concepto||""}</span>
<br><span class="small">${m.comentario||""}</span>
<button onclick="edit(${i})">Editar</button>
<button onclick="del(${i})">X</button>
</div>`;
});

app.innerHTML=`

<h1>Geo Finanzas</h1>

<div class="card">
<h2>${r.s.toFixed(2)}€</h2>
<p>Vaquita: ${r.v.toFixed(2)}</p>
<p>Combustible: ${r.fc.toFixed(2)}</p>
<p>Facturas: ${r.ff.toFixed(2)}</p>
</div>

<div class="card">

<select id="tipo">
<option value="facturacion">Facturación</option>
<option value="gasto">Gasto</option>
<option value="vaquita">Vaquita</option>
<option value="toComb">→ Combustible</option>
<option value="toFact">→ Facturas</option>
<option value="comb">Gasto combustible</option>
<option value="factura">Pago factura</option>
</select>

<input id="v1" placeholder="Importe">

<input id="v2" placeholder="Efectivo (facturación)">

<select id="concepto">
${data.conceptos.map(c=>`<option>${c}</option>`).join("")}
</select>

<input id="nuevoConcepto" placeholder="Nuevo concepto">

<textarea id="comentario" placeholder="Comentario"></textarea>

<button onclick="guardar()">Guardar</button>

</div>

<div class="card">${lista}</div>

`;
}

/* ACCIONES */

function guardar(){

let tipo=tipoSel();
let v1=+val("v1");
let v2=+val("v2");

let concepto=val("nuevoConcepto")||val("concepto");
let comentario=val("comentario");

if(val("nuevoConcepto") && !data.conceptos.includes(concepto)){
data.conceptos.push(concepto);
}

let m={tipo,concepto,comentario};

if(tipo==="facturacion"){
m.total=v1;
m.efectivo=v2;
}else{
m.importe=v1;
}

data.movimientos.push(m);
save(); main();
}

/* EDITAR SIN PROMPT */

function edit(i){

let m=data.movimientos[i];

app.innerHTML=`
<h2>Editar</h2>

<input id="imp" value="${m.importe||m.total}">
<input id="ef" value="${m.efectivo||""}">
<input id="con" value="${m.concepto||""}">
<textarea id="com">${m.comentario||""}</textarea>

<button onclick="saveEdit(${i})">Guardar</button>
<button onclick="main()">Cancelar</button>
`;
}

function saveEdit(i){

let m=data.movimientos[i];

if(m.tipo==="facturacion"){
m.total=+val("imp");
m.efectivo=+val("ef");
}else{
m.importe=+val("imp");
}

m.concepto=val("con");
m.comentario=val("com");

save(); main();
}

function del(i){ data.movimientos.splice(i,1); save(); main(); }

/* HELPERS */

function val(id){ return document.getElementById(id).value||""; }
function tipoSel(){ return val("tipo"); }

init();

</script>
</body>
</html>
